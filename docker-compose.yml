version: "3.8"

services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: mysql1234
      MYSQL_DATABASE: aptitudebuild
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"

  web:
    build: ./web
    command: bash -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./web:/app
    ports:
      - "8000:8000"
    environment:
      - DB_NAME=aptitudebuild
      - DB_USER=root
      - DB_PASSWORD=mysql1234
      - DB_HOST=db
      - DB_PORT=3306
      - DJANGO_SECRET_KEY=replace-me-with-secure-key
      - DEBUG=1
    depends_on:
      - db

volumes:
  db_data:
