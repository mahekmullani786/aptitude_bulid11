<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Aptitude Build</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-slate-50 text-slate-800">
    <header class="bg-white shadow">
      <div
        class="max-w-4xl mx-auto px-4 py-4 flex items-center justify-between"
      >
        <a href="/" class="text-xl font-semibold text-slate-900"
          >Aptitude Build</a
        >
        <nav class="flex items-center gap-4">
          {% if user.is_authenticated %}
          <span class="text-sm">Hello, {{ user.username }}</span>
          <a href="/accounts/logout/" class="text-sm text-slate-600">Logout</a>
          {% else %}
          <a href="/accounts/login/" class="text-sm text-slate-600">Login</a>
          <a href="/signup/" class="text-sm text-slate-900 font-medium"
            >Sign up</a
          >
          {% endif %}
        </nav>
      </div>
    </header>

    <main class="max-w-4xl mx-auto p-6">{% block content %}{% endblock %}</main>

    <footer class="max-w-4xl mx-auto p-6 text-center text-sm text-slate-500">
      Built with logical • Aptitude Build
    </footer>
  </body>
</html>
