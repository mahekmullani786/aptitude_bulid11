{% extends 'base.html' %}
{% block content %}
  <div class="max-w-md mx-auto bg-white p-6 rounded shadow">
    <h2 class="text-xl font-semibold mb-4">Verify your email</h2>
    <p>We sent a verification link to <strong>{{ email }}</strong>. Please check your inbox and click the link to activate your account.</p>
    <p class="mt-4">Didn't receive the email? Check spam or try signing up again.</p>
  </div>
{% endblock %}
