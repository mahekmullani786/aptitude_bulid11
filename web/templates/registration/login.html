{% extends 'base.html' %} {% block content %}
<div class="max-w-md mx-auto mt-12 bg-white p-8 rounded-lg shadow">
  <h1 class="text-2xl font-semibold mb-4">Welcome back</h1>
  {% if form.errors %}
  <div class="mb-4 text-sm text-red-600">Please correct the errors below.</div>
  {% endif %}

  <form method="post" class="space-y-4">
    {% csrf_token %}
    <div>
      <label class="block text-sm font-medium text-slate-700">Username</label>
      <input
        name="username"
        type="text"
        required
        autofocus
        class="mt-1 block w-full rounded-md border border-slate-200 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500"
      />
    </div>

    <div>
      <label class="block text-sm font-medium text-slate-700">Password</label>
      <input
        name="password"
        type="password"
        required
        class="mt-1 block w-full rounded-md border border-slate-200 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500"
      />
    </div>

    <div class="flex items-center justify-between">
      <div class="flex items-center gap-2">
        <input
          type="checkbox"
          name="remember"
          id="remember"
          class="h-4 w-4 text-indigo-600"
        />
        <label for="remember" class="text-sm text-slate-600">Remember me</label>
      </div>
      <a href="#" class="text-sm text-indigo-600">Forgot password?</a>
    </div>

    <div>
      <button
        type="submit"
        class="w-full bg-indigo-600 text-white px-4 py-2 rounded-md"
      >
        Sign in
      </button>
    </div>
  </form>

  <p class="mt-4 text-center text-sm text-slate-600">
    Don’t have an account?
    <a href="{% url 'quiz:signup' %}" class="text-indigo-600">Sign up</a>
  </p>
</div>
{% endblock %}
